services:
  frontend:
    container_name: gg-meet-fe
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL:-ws://localhost:7880}
        NEXT_PUBLIC_MEETING_SOCKET_URL: ${NEXT_PUBLIC_MEETING_SOCKET_URL:-http://localhost:8080/server}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://host.docker.internal:8080/api}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL:-ws://localhost:7880}
      NEXT_PUBLIC_MEETING_SOCKET_URL: ${NEXT_PUBLIC_MEETING_SOCKET_URL:-http://localhost:8080/server}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
